<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#160400"/>

  <!-- Outer decorative border ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#C9A56A" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="#C9A56A" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- Corner diamond ornaments at 4 cardinal points -->
  <polygon points="32,5 34,8 32,11 30,8" fill="#C9A56A"/>
  <polygon points="59,32 56,34 53,32 56,30" fill="#C9A56A"/>
  <polygon points="32,59 34,56 32,53 30,56" fill="#C9A56A"/>
  <polygon points="5,32 8,34 11,32 8,30" fill="#C9A56A"/>

  <!-- Central medallion background -->
  <circle cx="32" cy="32" r="14" fill="#C9A56A" opacity="0.15"/>

  <!-- Central medallion petals (8-pointed floral) -->
  <g fill="#C9A56A" opacity="0.9">
    <!-- Top petal -->
    <ellipse cx="32" cy="22" rx="2.5" ry="5" fill="#C9A56A"/>
    <!-- Bottom petal -->
    <ellipse cx="32" cy="42" rx="2.5" ry="5" fill="#C9A56A"/>
    <!-- Left petal -->
    <ellipse cx="22" cy="32" rx="5" ry="2.5" fill="#C9A56A"/>
    <!-- Right petal -->
    <ellipse cx="42" cy="32" rx="5" ry="2.5" fill="#C9A56A"/>
    <!-- Diagonal petals -->
    <ellipse cx="25" cy="25" rx="2.5" ry="5" transform="rotate(45 25 25)" fill="#C9A56A"/>
    <ellipse cx="39" cy="25" rx="2.5" ry="5" transform="rotate(-45 39 25)" fill="#C9A56A"/>
    <ellipse cx="25" cy="39" rx="2.5" ry="5" transform="rotate(-45 25 39)" fill="#C9A56A"/>
    <ellipse cx="39" cy="39" rx="2.5" ry="5" transform="rotate(45 39 39)" fill="#C9A56A"/>
  </g>

  <!-- Central dot -->
  <circle cx="32" cy="32" r="4" fill="#C9A56A"/>
  <circle cx="32" cy="32" r="2" fill="#160400"/>

  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#C9A56A" stroke-width="0.8" opacity="0.5"/>
</svg>